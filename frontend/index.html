<!DOCTYPE html>
<html>
<head>
    <title>Uni Exchange - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2 style="color:#004aad">Uni Exchange</h2>
        <p id="sub">Sign in to continue</p>

        <div id="login-box">
            <input type="email" id="l-email" placeholder="Email (@bmu.edu.in)">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-blue" onclick="login()">Login</button>
            <p class="toggle-link">New? <span onclick="toggle()">Register</span></p>
        </div>

        <div id="reg-box" style="display:none">
            <input type="text" id="r-fname" placeholder="First Name">
            <input type="text" id="r-lname" placeholder="Last Name">
            <input type="text" id="r-phone1" placeholder="Primary Phone Number">
            <input type="text" id="r-phone2" placeholder="Alternative Phone Number (Optional)">
            <input type="text" id="r-cid" placeholder="College ID">
            <input type="email" id="r-email" placeholder="Email">
            <input type="password" id="r-pass" placeholder="Password">
            <button class="btn-blue" onclick="register()">Create Account</button>
            <p class="toggle-link">Have account? <span onclick="toggle()">Login</span></p>
        </div>
    </div>

    <script>
        const API = "/api";
        function toggle() {
            const l = document.getElementById('login-box'), r = document.getElementById('reg-box');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
            r.style.display = r.style.display === 'none' ? 'block' : 'none';
        }

        async function login() {
            const email = document.getElementById('l-email').value, password = document.getElementById('l-pass').value;
            const res = await fetch(`${API}/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            if(res.ok) { localStorage.setItem('user', JSON.stringify(data.user)); window.location.href='dashboard.html'; }
            else alert(data.message);
        }

        async function register() {
            const body = {
                first_name: document.getElementById('r-fname').value,
                last_name: document.getElementById('r-lname').value,
                phone_primary: document.getElementById('r-phone1').value,
                phone_alt: document.getElementById('r-phone2').value,
                college_id: document.getElementById('r-cid').value,
                email: document.getElementById('r-email').value,
                password: document.getElementById('r-pass').value
            };
            const res = await fetch(`${API}/register`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(res.ok) { alert("Registration Success!"); toggle(); }
            else alert("Error: Account exists or email invalid");
        }
    </script>
</body>
</html>
